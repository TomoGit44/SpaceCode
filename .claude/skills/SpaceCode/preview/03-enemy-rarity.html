<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Enemy types & rarities</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .stack > * + * { margin-top: 12px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row.wrap { flex-wrap: wrap; }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); }
  code { font-family: var(--font-mono); font-size: 11px; color: var(--ui-dim); }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
  <div>
    <div class="meta" style="margin-bottom:6px;">ENEMY VARIANTS</div>
    <div style="display:flex; gap:8px;">
      
        <div style="flex:1; background:#ff4d5a; height:62px; padding:8px;">
          <div style="font-weight:700; color:#05070d; font-size:12px;">basic</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:#0a1020; opacity:0.8;">#ff4d5a</div>
        </div>
        <div style="flex:1; background:#ff9040; height:62px; padding:8px;">
          <div style="font-weight:700; color:#05070d; font-size:12px;">fast</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:#0a1020; opacity:0.8;">#ff9040</div>
        </div>
        <div style="flex:1; background:#b01828; height:62px; padding:8px;">
          <div style="font-weight:700; color:#05070d; font-size:12px;">tank</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:#0a1020; opacity:0.8;">#b01828</div>
        </div>
    </div>
  </div>
  <div>
    <div class="meta" style="margin-bottom:6px;">RARITY TIERS</div>
    <div style="display:flex; gap:8px;">
      
        <div style="flex:1; background:#9aa4ba; height:62px; padding:8px;">
          <div style="font-weight:700; color:#05070d; font-size:12px;">N</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:#0a1020; opacity:0.8;">#9aa4ba</div>
        </div>
        <div style="flex:1; background:#4ea1ff; height:62px; padding:8px;">
          <div style="font-weight:700; color:#05070d; font-size:12px;">R</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:#0a1020; opacity:0.8;">#4ea1ff</div>
        </div>
        <div style="flex:1; background:#c66cff; height:62px; padding:8px;">
          <div style="font-weight:700; color:#05070d; font-size:12px;">SR</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:#0a1020; opacity:0.8;">#c66cff</div>
        </div>
        <div style="flex:1; background:#ffd24a; height:62px; padding:8px;">
          <div style="font-weight:700; color:#05070d; font-size:12px;">L</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:#0a1020; opacity:0.8;">#ffd24a</div>
        </div>
    </div>
  </div>
</div>

</body></html>
