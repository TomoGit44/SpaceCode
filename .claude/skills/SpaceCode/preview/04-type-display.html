<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .stack > * + * { margin-top: 12px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row.wrap { flex-wrap: wrap; }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); }
  code { font-family: var(--font-mono); font-size: 11px; color: var(--ui-dim); }
</style>
</head>
<body>

<div class="stack">
  <div style="font-family: var(--font-display); font-size: 64px; font-weight: 700; letter-spacing:-0.02em; line-height:1; color: var(--ui);">SpaceCode</div>
  <div style="font-family: var(--font-sans); font-size: 18px; color: var(--accent);">— 宇宙タワーディフェンス × コードプログラミング —</div>
  <div class="meta" style="margin-top:12px;">Space Grotesk · 64–96px · weight 700 · tracking -0.02em</div>
</div>

</body></html>
