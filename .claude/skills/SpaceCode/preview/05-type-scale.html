<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Body type scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .stack > * + * { margin-top: 12px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row.wrap { flex-wrap: wrap; }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); }
  code { font-family: var(--font-mono); font-size: 11px; color: var(--ui-dim); }
</style>
</head>
<body>

<div class="stack" style="font-family: var(--font-sans);">
  <div style="display:flex; align-items:baseline; gap:14px;"><span style="color:var(--ui-dim); font-size:11px; font-family:var(--font-mono); width:60px;">h1 / 22</span><span style="font-size:22px; font-weight:700;">▶ PHASE 1 / 5 開始</span></div>
  <div style="display:flex; align-items:baseline; gap:14px;"><span style="color:var(--ui-dim); font-size:11px; font-family:var(--font-mono); width:60px;">h2 / 20</span><span style="font-size:20px; font-weight:700; color:var(--resource);">$120</span></div>
  <div style="display:flex; align-items:baseline; gap:14px;"><span style="color:var(--ui-dim); font-size:11px; font-family:var(--font-mono); width:60px;">h3 / 18</span><span style="font-size:18px; font-weight:700;">100/100</span></div>
  <div style="display:flex; align-items:baseline; gap:14px;"><span style="color:var(--ui-dim); font-size:11px; font-family:var(--font-mono); width:60px;">body / 14</span><span style="font-size:14px;">移動 → 惑星A</span></div>
  <div style="display:flex; align-items:baseline; gap:14px;"><span style="color:var(--ui-dim); font-size:11px; font-family:var(--font-mono); width:60px;">meta / 13</span><span style="font-size:13px; color:var(--accent);">Phase 開始まで待機中</span></div>
  <div style="display:flex; align-items:baseline; gap:14px;"><span style="color:var(--ui-dim); font-size:11px; font-family:var(--font-mono); width:60px;">caption/12</span><span style="font-size:12px; color:var(--ui-dim);">宇宙船を購入・船をクリックしてプログラム編集ができます</span></div>
</div>

</body></html>
