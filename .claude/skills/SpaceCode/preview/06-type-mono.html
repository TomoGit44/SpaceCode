<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Mono & code specimens</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .stack > * + * { margin-top: 12px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row.wrap { flex-wrap: wrap; }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); }
  code { font-family: var(--font-mono); font-size: 11px; color: var(--ui-dim); }
</style>
</head>
<body>

<div class="stack">
  <div class="meta">JetBrains Mono · used for code in marketing surfaces only</div>
  <pre style="margin:0; padding:12px 14px; background:var(--panel-bg); border:1px solid var(--panel-border); font-family:var(--font-mono); font-size:13px; color:var(--ui); line-height:1.5;">MOVE_TO   <span style="color:var(--ally);">惑星A</span>
MINE      <span style="color:var(--ally);">惑星A</span>
MOVE_TO   <span style="color:var(--ally);">基地</span>
DEPOSIT
<span style="color:var(--accent);">REPEAT × 3</span>
  ATTACK_NEAREST</pre>
</div>

</body></html>
