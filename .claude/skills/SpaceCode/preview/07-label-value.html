<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Label & value pattern</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .stack > * + * { margin-top: 12px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row.wrap { flex-wrap: wrap; }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); }
  code { font-family: var(--font-mono); font-size: 11px; color: var(--ui-dim); }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:24px; padding-top:12px;">
  
    <div>
      <div style="font-size:12px; color:var(--ui-dim); letter-spacing:0.04em;">基地HP</div>
      <div style="font-size:20px; font-weight:700; color:var(--ui); margin-top:4px;">100/100</div>
    </div>
    <div>
      <div style="font-size:12px; color:var(--ui-dim); letter-spacing:0.04em;">PHASE</div>
      <div style="font-size:20px; font-weight:700; color:var(--ui); margin-top:4px;">3 / 5</div>
    </div>
    <div>
      <div style="font-size:12px; color:var(--ui-dim); letter-spacing:0.04em;">クレジット</div>
      <div style="font-size:20px; font-weight:700; color:var(--resource); margin-top:4px;">$240</div>
    </div>
</div>
<div class="meta" style="margin-top:20px;">label = dim regular · value = bold high-contrast</div>

</body></html>
