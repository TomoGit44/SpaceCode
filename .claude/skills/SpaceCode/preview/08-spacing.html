<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Spacing tokens</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .stack > * + * { margin-top: 12px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row.wrap { flex-wrap: wrap; }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); }
  code { font-family: var(--font-mono); font-size: 11px; color: var(--ui-dim); }
</style>
</head>
<body>

<div style="display:flex; flex-direction:column; gap:6px;">
  <div style="display:flex; align-items:center; gap:14px;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui-dim); width:48px;">--s-1</span>
      <div style="width:4px; height:14px; background:var(--ally);"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui);">4px</span>
    </div><div style="display:flex; align-items:center; gap:14px;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui-dim); width:48px;">--s-2</span>
      <div style="width:8px; height:14px; background:var(--ally);"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui);">8px</span>
    </div><div style="display:flex; align-items:center; gap:14px;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui-dim); width:48px;">--s-3</span>
      <div style="width:12px; height:14px; background:var(--ally);"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui);">12px</span>
    </div><div style="display:flex; align-items:center; gap:14px;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui-dim); width:48px;">--s-4</span>
      <div style="width:16px; height:14px; background:var(--ally);"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui);">16px</span>
    </div><div style="display:flex; align-items:center; gap:14px;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui-dim); width:48px;">--s-5</span>
      <div style="width:24px; height:14px; background:var(--ally);"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui);">24px</span>
    </div><div style="display:flex; align-items:center; gap:14px;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui-dim); width:48px;">--s-6</span>
      <div style="width:32px; height:14px; background:var(--ally);"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui);">32px</span>
    </div><div style="display:flex; align-items:center; gap:14px;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui-dim); width:48px;">--s-7</span>
      <div style="width:48px; height:14px; background:var(--ally);"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui);">48px</span>
    </div><div style="display:flex; align-items:center; gap:14px;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui-dim); width:48px;">--s-8</span>
      <div style="width:64px; height:14px; background:var(--ally);"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ui);">64px</span>
    </div>
</div>

</body></html>
