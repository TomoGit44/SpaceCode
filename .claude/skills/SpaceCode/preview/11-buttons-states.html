<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Button states</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); margin-top: 10px; }
</style>

<body>

<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
  
    <div style="background:var(--panel-bg); border:1px solid color-mix(in srgb, var(--ally) 70%, transparent); padding: 10px 14px; height: 40px; box-sizing: border-box; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--ui); opacity:1;">
      Õ«çÕ«Ö×ê╣  $70
    </div>
    <div style="text-align:center; font-size:10px; color:var(--ui-dim); font-family:var(--font-mono); margin-top:-4px;">Default</div>
  
    <div style="background:var(--panel-hover); border:1px solid color-mix(in srgb, var(--ally) 70%, transparent); padding: 10px 14px; height: 40px; box-sizing: border-box; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--ui); opacity:1;">

    </div>
    <div style="text-align:center; font-size:10px; color:var(--ui-dim); font-family:var(--font-mono); margin-top:-4px;">Hover</div>
  
    <div style="background:var(--panel-bg); border:2px solid var(--ally); padding: 10px 14px; height: 40px; box-sizing: border-box; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--ui); opacity:1;">
      Õ«çÕ«Ö×ê╣  $70
    </div>
    <div style="text-align:center; font-size:10px; color:var(--ui-dim); font-family:var(--font-mono); margin-top:-4px;">Selected</div>
  
    <div style="background:var(--panel-bg); border:1px solid color-mix(in srgb, var(--ui-dim) 50%, transparent); padding: 10px 14px; height: 40px; box-sizing: border-box; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--ui-dim); opacity:0.45;">
      Õ«çÕ«Ö×ê╣  $70
    </div>
