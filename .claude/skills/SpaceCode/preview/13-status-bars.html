<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Status bar set (HP / Energy / Inventory)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); margin-top: 10px; }
</style>
</head>
<body>

<style>
  .bar-set { display:flex; flex-direction:column; gap:6px; padding:10px 0; }
  .bar-row { display:flex; align-items:center; gap:12px; }
  .bar-lbl { width:90px; font-size:12px; color: var(--ui-dim); font-family: var(--font-mono); }
  .bar-bg  { flex:1; height: 6px; background: var(--panel-bg); position:relative; }
  .bar-fg  { position:absolute; left:0; top:0; bottom:0; }
  .bar-val { font-size:12px; color: var(--ui); font-family: var(--font-mono); width: 64px; text-align:right; }
</style>
<div class="bar-set">
  <div class="bar-row">
    <div class="bar-lbl">HP</div>
    <div class="bar-bg"><div class="bar-fg" style="width:76%; background: var(--accent);"></div></div>
    <div class="bar-val">76 / 100</div>
  </div>
  <div class="bar-row">
    <div class="bar-lbl">HP critical</div>
    <div class="bar-bg"><div class="bar-fg" style="width:18%; background: var(--enemy);"></div></div>
    <div class="bar-val">18 / 100</div>
  </div>
  <div class="bar-row">
    <div class="bar-lbl">Energy</div>
    <div class="bar-bg"><div class="bar-fg" style="width:62%; background: var(--ally);"></div></div>
    <div class="bar-val">62 / 100</div>
  </div>
  <div class="bar-row">
    <div class="bar-lbl">Inventory</div>
    <div class="bar-bg"><div class="bar-fg" style="width:90%; background: var(--resource);"></div></div>
    <div class="bar-val">18 / 20</div>
  </div>
</div>
<div class="meta">stack 2-3 bars under any entity. always 6px tall, 1px gap. color codes meaning.</div>

</body></html>
