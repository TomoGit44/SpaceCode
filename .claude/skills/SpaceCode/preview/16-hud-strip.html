<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Game HUD strip</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); margin-top: 10px; }
</style>
</head>
<body>

<style>
  .hud {
    background: var(--bg);
    border: 1px solid var(--panel-border);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: start;
    gap: 16px;
  }
  .hud-lbl { font-size:12px; color:var(--ui-dim); letter-spacing:0.04em; }
  .hud-val { font-size:20px; font-weight:700; color:var(--ui); margin-top:2px;}
  .hud-bar {
    margin-top:8px; height:6px; background: var(--panel-bg); position:relative; width: 180px;
  }
  .hud-bar > div { position:absolute; inset:0 auto 0 0; background: var(--accent); width: 76%;}
  .center { text-align:center; }
  .right { text-align:right; }
</style>
<div class="hud">
  <div>
    <div class="hud-lbl">基地HP</div>
    <div class="hud-val">76/100</div>
    <div class="hud-bar"><div></div></div>
  </div>
  <div class="center">
    <div class="hud-lbl">PHASE</div>
    <div class="hud-val">3 / 5</div>
    <div style="margin-top:8px; font-size:13px; color:var(--accent);">編成: basic × 6 / fast × 3</div>
  </div>
  <div class="right">
    <div class="hud-lbl">クレジット</div>
    <div class="hud-val" style="color: var(--resource);">$240</div>
  </div>
</div>

</body></html>
