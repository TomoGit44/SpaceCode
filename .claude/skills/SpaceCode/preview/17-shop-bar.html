<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Shop bar (bottom of screen)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); margin-top: 10px; }
</style>
</head>
<body>

<style>
  .shop {
    background: rgba(10, 16, 32, 0.85);
    border-top: 1px solid var(--panel-bg);
    height: 60px;
    display:flex; align-items:center; justify-content:center;
    gap: 16px;
  }
  .shop-btn {
    background: var(--panel-bg);
    border: 1px solid color-mix(in srgb, var(--ally) 70%, transparent);
    width: 180px; height: 40px;
    display:flex; align-items:center; justify-content:center;
    font-weight: 700; font-size: 15px; color: var(--ui);
  }
  .shop-hint {
    position: absolute;
    left: 16px; bottom: 68px;
    font-size: 12px; color: var(--accent);
  }
</style>
<div style="background:var(--bg); padding-top: 36px; position:relative;">
  <div class="shop-hint">▶ 開始ボタンで Wave スタート</div>
  <div class="shop"><div class="shop-btn">宇宙船  $70</div></div>
</div>

</body></html>
