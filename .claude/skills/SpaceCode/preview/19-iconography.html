<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Iconography — full glyph inventory</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); margin-top: 10px; }
</style>
</head>
<body>

<style>
  .gly { display:grid; grid-template-columns: repeat(8, 1fr); gap: 8px; padding: 8px 0; }
  .gly-cell {
    border: 1px solid var(--panel-border);
    background: var(--panel-bg);
    padding: 12px 6px;
    text-align: center;
  }
  .gly-ch { font-size: 26px; line-height: 1; color: var(--ui); }
  .gly-lb { font-size: 10px; color: var(--ui-dim); font-family: var(--font-mono); margin-top: 6px; }
</style>
<div class="gly">
  
    <div class="gly-cell">
      <div class="gly-ch">▶</div>
      <div class="gly-lb">play / running</div>
    </div>
    <div class="gly-cell">
      <div class="gly-ch">▼</div>
      <div class="gly-lb">down / start</div>
    </div>
    <div class="gly-cell">
      <div class="gly-ch">▲</div>
      <div class="gly-lb">up</div>
    </div>
    <div class="gly-cell">
      <div class="gly-ch">✕</div>
      <div class="gly-lb">close / delete</div>
    </div>
    <div class="gly-cell">
      <div class="gly-ch">+</div>
      <div class="gly-lb">increment</div>
    </div>
    <div class="gly-cell">
      <div class="gly-ch">−</div>
      <div class="gly-lb">decrement</div>
    </div>
    <div class="gly-cell">
      <div class="gly-ch">→</div>
      <div class="gly-lb">transition</div>
    </div>
    <div class="gly-cell">
      <div class="gly-ch">↻</div>
      <div class="gly-lb">loop</div>
    </div>
</div>
<div class="meta">the entire icon set is 8 Unicode glyphs. no icon font, no SVG library, no emoji.</div>

</body></html>
