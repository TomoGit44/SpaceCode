<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Logo & wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }

    background: var(--bg);

<div style="display:grid; grid-template-columns: 130px 1fr; gap:18px; align-items:center;">

    <img src="../assets/logo-wordmark.svg" width="420" alt="SpaceCode wordmark"/>
