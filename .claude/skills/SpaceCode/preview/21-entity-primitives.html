<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Entity primitives — runtime-drawn vectors</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); margin-top: 10px; }
</style>
</head>
<body>

<style>
  .ent { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 6px 0; }
  .ent-cell {
    background: var(--bg); border: 1px solid var(--panel-border);
    padding: 12px 6px 8px; text-align: center;
  }
  .ent-cell img { width: 80px; height: 80px; }
  .ent-lb { font-size: 11px; color: var(--ui-dim); font-family: var(--font-mono); margin-top: 6px; }
</style>
<div class="ent">
  
    <div class="ent-cell">
      <img src="../assets/entity-base.svg" alt="Base · purple"/>
      <div class="ent-lb">Base · purple</div>
    </div>
    <div class="ent-cell">
      <img src="../assets/entity-ship.svg" alt="Ship · ally blue"/>
      <div class="ent-lb">Ship · ally blue</div>
    </div>
    <div class="ent-cell">
      <img src="../assets/entity-enemy-basic.svg" alt="basic · red"/>
      <div class="ent-lb">basic · red</div>
    </div>
    <div class="ent-cell">
      <img src="../assets/entity-enemy-fast.svg" alt="fast · orange"/>
      <div class="ent-lb">fast · orange</div>
    </div>
    <div class="ent-cell">
      <img src="../assets/entity-planet.svg" alt="Planet · gold"/>
      <div class="ent-lb">Planet · gold</div>
    </div>
</div>

</body></html>
