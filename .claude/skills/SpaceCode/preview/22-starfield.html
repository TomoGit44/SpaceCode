<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Starfield background recipe</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ui);
    font-family: var(--font-sans);
    padding: 18px 20px;
    box-sizing: border-box;
  }
  .meta { color: var(--ui-dim); font-size: 11px; font-family: var(--font-mono); margin-top: 10px; }
</style>
</head>
<body>

<div style="position:relative; height: 220px; border: 1px solid var(--panel-border); background-image: url('../assets/starfield.svg'); background-size: 200px 200px; background-repeat: repeat;">
  <div style="position:absolute; inset:auto 0 16px 0; text-align:center; color: var(--ui-dim); font-family: var(--font-mono); font-size: 11px;">
    ~0.00018 dots/px · 82% dim 0.8px · 18% bright 1.4px · seeded random
  </div>
</div>

</body></html>
