<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05070d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpaceCode" />
    <meta name="description" content="プログラムで宇宙船を動かして基地を守る、コーディング・タワーディフェンス" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>SpaceCode</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #05070d;
        color: #cfd6e6;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
        /* スマホでのダブルタップ拡大・テキスト選択・プルリフレッシュを抑制 */
        touch-action: manipulation;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100vw;
        /* iOS Safari のアドレスバー対応 (dvh が無い古いブラウザは 100vh にフォールバック) */
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* iPhone のノッチ/ホームインジケータを避ける */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      canvas {
        display: block;
      }
      /* 縦持ちスマホ用「横にしてください」オーバーレイ。
         orientation: landscape のとき、または十分広い画面では非表示。 */
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #05070d;
        color: #cfd6e6;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        padding: 24px;
        text-align: center;
        font-size: 16px;
        line-height: 1.6;
      }
      #rotate-hint .icon {
        font-size: 56px;
        animation: rotate-hint-spin 2.4s ease-in-out infinite;
      }
      #rotate-hint .title {
        font-size: 20px;
        font-weight: 600;
        color: #ffffff;
      }
      #rotate-hint .sub {
        color: #6b7da0;
        font-size: 13px;
      }
      @keyframes rotate-hint-spin {
        0%, 40% { transform: rotate(0deg); }
        60%, 100% { transform: rotate(90deg); }
      }
      /* 縦持ち かつ 横幅が狭い端末でだけ表示 (タブレット横や PC では出さない) */
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate-hint { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-hint" role="alert">
      <div class="icon">📱</div>
      <div class="title">横向きにしてください</div>
      <div class="sub">SpaceCode は横画面でプレイします</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
