<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05070d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpaceCode" />
    <meta name="description" content="プログラムで宇宙船を動かして基地を守る、コーディング・タワーディフェンス" />
    <title>SpaceCode</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #05070d;
        color: #cfd6e6;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
        /* スマホでのダブルタップ拡大・テキスト選択・プルリフレッシュを抑制 */
        touch-action: manipulation;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100vw;
        /* iOS Safari のアドレスバー対応 (dvh が無い古いブラウザは 100vh にフォールバック) */
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* iPhone のノッチ/ホームインジケータを避ける */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
